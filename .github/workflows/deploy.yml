name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.0"
          terraform_wrapper: false

      - name: Terraform apply
        working-directory: terraform
        run: |
          terraform init -input=false
          terraform apply -auto-approve -input=false

      - name: Get the server IP
        id: tf
        working-directory: terraform
        run: echo "ip=$(terraform output -raw instance_public_ip)" >> "$GITHUB_OUTPUT"

      - name: Write the SSH key and inventory
        env:
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          install -m 600 /dev/null ansible/minecraft-key.pem
          echo "$SSH_PRIVATE_KEY_B64" | base64 -d > ansible/minecraft-key.pem
          cat > ansible/inventory.ini <<EOF
          [minecraft]
          ${{ steps.tf.outputs.ip }} ansible_user=ubuntu ansible_ssh_private_key_file=minecraft-key.pem
          EOF

      - name: Install Ansible
        run: pip install ansible

      - name: Wait for SSH
        run: |
          for i in $(seq 1 30); do
            nc -z -w5 ${{ steps.tf.outputs.ip }} 22 && exit 0
            sleep 10
          done
          echo "SSH never came up"; exit 1

      - name: Run the playbook
        working-directory: ansible
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: ansible-playbook -i inventory.ini playbook.yml

      - run: echo "Minecraft is up at ${{ steps.tf.outputs.ip }}:25565"
