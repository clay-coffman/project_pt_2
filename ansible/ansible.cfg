[defaults]
inventory = inventory.ini
remote_user = ubuntu
host_key_checking = False
retry_files_enabled = False

[ssh_connection]
# Use only the key from the inventory, not whatever's loaded in the SSH agent,
# otherwise the server rejects us with "too many authentication failures".
ssh_args = -o IdentitiesOnly=yes -o IdentityAgent=none -o ControlMaster=auto -o ControlPersist=60s
